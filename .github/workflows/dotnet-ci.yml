name: .NET 10 CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install external tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg mkvtoolnix

      - name: Restore
        run: dotnet restore ChapterTool.Avalonia.slnx

      - name: Build
        run: dotnet build ChapterTool.Avalonia.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ChapterTool.Avalonia.slnx --configuration Release --no-build --blame-hang --blame-hang-timeout 10m --blame-hang-dump-type full

  publish:
    needs: build-test
    name: Publish (${{ matrix.runtime }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - win-x64
          - linux-x64
          - osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/ChapterTool.Avalonia/ChapterTool.Avalonia.csproj --runtime ${{ matrix.runtime }}

      - name: Publish
        run: ./scripts/publish.sh -Runtime ${{ matrix.runtime }} -NoRestore -PublishSingleFile

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChapterTool-Avalonia-${{ matrix.runtime }}
          path: artifacts/publish/framework-dependent/${{ matrix.runtime }}
          if-no-files-found: error
