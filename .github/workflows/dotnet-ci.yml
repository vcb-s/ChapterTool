name: .NET 10 CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChapterTool.Avalonia.slnx

      - name: Build
        run: dotnet build ChapterTool.Avalonia.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ChapterTool.Avalonia.slnx --configuration Release --no-build
