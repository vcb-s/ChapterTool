name: .NET 10 CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install external tools
        run: choco install ffmpeg mkvtoolnix --no-progress -y

      - name: Restore
        run: dotnet restore ChapterTool.Avalonia.slnx

      - name: Build
        run: dotnet build ChapterTool.Avalonia.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ChapterTool.Avalonia.slnx --configuration Release --no-build --blame-hang --blame-hang-timeout 10m --blame-hang-dump-type Full

  publish:
    needs: build-test
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - win-x64
          - linux-x64
          - osx-x64
          - osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/ChapterTool.Avalonia/ChapterTool.Avalonia.csproj --runtime ${{ matrix.runtime }}

      - name: Publish
        run: >
          dotnet publish src/ChapterTool.Avalonia/ChapterTool.Avalonia.csproj
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained false
          --no-restore
          --output artifacts/publish/framework-dependent/${{ matrix.runtime }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChapterTool-Avalonia-${{ matrix.runtime }}
          path: artifacts/publish/framework-dependent/${{ matrix.runtime }}
          if-no-files-found: error
