name: .NET 10 CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install external tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg mkvtoolnix

      - name: Restore
        run: dotnet restore ChapterTool.Avalonia.slnx

      - name: Build
        run: dotnet build ChapterTool.Avalonia.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ChapterTool.Avalonia.slnx --configuration Release --no-build --blame-hang --blame-hang-timeout 10m --blame-hang-dump-type full

      - name: Pack ChapterTool.Core
        run: dotnet pack src/ChapterTool.Core/ChapterTool.Core.csproj --configuration Release --no-restore --output artifacts/nuget

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChapterTool.Core.nupkg
          path: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg
          if-no-files-found: error

  publish-app:
    needs: build-test
    name: Publish App (${{ matrix.runtime }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: win-x64
            os: ubuntu-24.04
            artifact-path: artifacts/publish/framework-dependent/win-x64
          - runtime: linux-x64
            os: ubuntu-24.04
            artifact-path: artifacts/publish/framework-dependent/linux-x64
          - runtime: osx-arm64
            os: macos-latest
            artifact-path: artifacts/publish/framework-dependent/osx-arm64/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/ChapterTool.Avalonia/ChapterTool.Avalonia.csproj --runtime ${{ matrix.runtime }}

      - name: Publish
        run: ./scripts/publish.sh -Runtime ${{ matrix.runtime }} -NoRestore -PublishSingleFile

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChapterTool-Avalonia-${{ matrix.runtime }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
